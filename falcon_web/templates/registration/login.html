<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تسجيل الدخول</title><style>body{font-family:Tahoma;background:#f4f7f6}.box{max-width:450px;margin:55px auto;background:#fff;padding:30px;border-radius:18px}input{width:100%;box-sizing:border-box;padding:12px;margin:7px 0 16px;border:1px solid #ddd;border-radius:9px}button{width:100%;padding:13px;background:#087f5b;color:#fff;border:0;border-radius:10px}</style></head><body><main class="box"><h1>تسجيل الدخول</h1>{% if form.errors %}<p>اسم المستخدم أو كلمة المرور غير صحيحة.</p>{% endif %}<form method="post">{% csrf_token %}{{ form.as_p }}<button>دخول</button></form><p>ليس لديك حساب؟ <a href="{% url 'register' %}">إنشاء حساب</a></p></main></body></html>
