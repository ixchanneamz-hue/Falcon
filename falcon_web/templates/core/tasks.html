<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>المهام</title><style>body{font-family:Tahoma;background:#f4f7f6;margin:0;color:#173b32}.wrap{max-width:900px;margin:auto;padding:35px 18px}.task{background:#fff;padding:24px;margin:16px 0;border-radius:16px;box-shadow:0 5px 18px #0001}.reward{color:#087f5b;font-weight:bold}.btn{display:inline-block;background:#087f5b;color:#fff;padding:11px 20px;border-radius:10px;text-decoration:none}</style></head><body><main class="wrap"><h1>🎯 المهام المتاحة</h1>{% for task in tasks %}<article class="task"><h2>{{ task.title }}</h2><p>{{ task.description }}</p><p class="reward">المكافأة: {{ task.reward }} USDT</p><p>مدة المشاهدة: {{ task.watch_seconds }} ثانية</p><a class="btn" href="{% url 'complete_task' task.id %}">بدء المهمة</a></article>{% empty %}<div class="task">لا توجد مهام متاحة حاليًا.</div>{% endfor %}<a href="{% url 'dashboard' %}">العودة إلى لوحة المستخدم</a></main></body></html>
