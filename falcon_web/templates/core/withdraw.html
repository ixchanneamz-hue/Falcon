<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>طلب سحب</title><style>body{font-family:Tahoma;background:#f4f7f6}.box{max-width:520px;margin:50px auto;background:#fff;padding:30px;border-radius:18px}input{width:100%;box-sizing:border-box;padding:13px;margin:8px 0 18px;border:1px solid #ddd;border-radius:10px}button{width:100%;padding:13px;background:#087f5b;color:#fff;border:0;border-radius:10px}</style></head><body><main class="box"><h1>💸 طلب سحب</h1><p>رصيدك: <strong>{{ balance }} USDT</strong></p><p>الحد الأدنى: 1 USDT — الشبكة: TRC20</p>{% for message in messages %}<p>{{ message }}</p>{% endfor %}<form method="post">{% csrf_token %}<label>المبلغ</label><input name="amount" type="number" min="1" step="0.000001" required><label>عنوان محفظة USDT</label><input name="wallet_address" required><button>إرسال الطلب</button></form></main></body></html>
