<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ task.title }}</title><style>body{font-family:Tahoma;background:#f4f7f6}.box{max-width:650px;margin:35px auto;background:#fff;padding:28px;border-radius:18px}textarea,select{width:100%;box-sizing:border-box;padding:12px;margin:8px 0 18px;border:1px solid #ddd;border-radius:10px}button,.link{display:block;width:100%;box-sizing:border-box;text-align:center;padding:13px;background:#087f5b;color:#fff;border:0;border-radius:10px;text-decoration:none;margin:12px 0}button:disabled{background:#9aa}.timer{text-align:center;font-size:25px;font-weight:bold;color:#087f5b}</style></head><body><main class="box"><h1>{{ task.title }}</h1><p>{{ task.description }}</p><p>المكافأة: <strong>{{ task.reward }} USDT</strong></p><a class="link" href="{{ task.content_url }}" target="_blank" rel="noopener" id="openContent">فتح المحتوى وبدء المؤقت</a><div class="timer" id="timer">اضغط على فتح المحتوى</div>{% for message in messages %}<p>{{ message }}</p>{% endfor %}<form method="post">{% csrf_token %}<label>تعليقك (3 كلمات على الأقل)</label><textarea name="comment" rows="4" required></textarea><label>التقييم</label><select name="rating" required><option value="">اختر</option><option value="5">5 نجوم</option><option value="4">4 نجوم</option><option value="3">3 نجوم</option><option value="2">نجمتان</option><option value="1">نجمة</option></select><button id="submitBtn" disabled>إكمال المهمة والحصول على المكافأة</button></form></main><script>const seconds={{ task.watch_seconds }};let started=false;document.getElementById('openContent').onclick=()=>{if(started)return;started=true;let left=seconds;const timer=document.getElementById('timer'),btn=document.getElementById('submitBtn');timer.textContent='الوقت المتبقي: '+left+' ثانية';const interval=setInterval(()=>{left--;timer.textContent='الوقت المتبقي: '+left+' ثانية';if(left<=0){clearInterval(interval);timer.textContent='يمكنك الآن إرسال المهمة';btn.disabled=false}},1000)};</script></body></html>
