<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة المستخدم</title><style>body{font-family:Tahoma,Arial;margin:0;background:#f4f7f6;color:#183b32}.top{padding:20px 7%;background:#087f5b;color:#fff;display:flex;justify-content:space-between}.wrap{padding:40px 7%}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px}.card{background:#fff;padding:25px;border-radius:16px;box-shadow:0 6px 20px #0000000d}.value{font-size:28px;font-weight:bold;color:#087f5b}.actions{margin-top:28px}.actions a{display:inline-block;margin:5px;padding:12px 18px;background:#087f5b;color:#fff;text-decoration:none;border-radius:10px}</style></head><body><header class="top"><strong>🦅 Falcon</strong><span>مرحبًا {{ user.username }}</span></header><main class="wrap"><h1>لوحة المستخدم</h1><section class="grid"><div class="card"><h3>الرصيد الحالي</h3><div class="value">{{ balance }} USDT</div></div><div class="card"><h3>المهام المكتملة</h3><div class="value">{{ completed_tasks }}</div></div><div class="card"><h3>الإحالات</h3><div class="value">{{ referrals }}</div></div></section><div class="actions"><a href="#">المهام المتاحة</a><a href="#">طلب سحب</a><a href="#">سجل العمليات</a></div></main></body></html>
